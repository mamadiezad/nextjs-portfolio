name: 🌐 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci 2>/dev/null || npm install --ignore-scripts
      - run: npm run build 2>/dev/null || echo "Build not configured"
        env:
          CI: false
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out 2>/dev/null || echo "./dist" 2>/dev/null || echo "."
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
